name: Security Workflow

on:
  workflow_call:
    inputs:
      sonar_host_url:
        description: "SonarQube host URL"
        required: false
        type: string
        default: "http://sonar.afya.tools:9000/"
      sonar_exclusions:
        description: "Additional Sonar exclusions"
        required: false
        type: string
        default: ""
      fail_on_quality_gate:
        description: "Fail the job if the SonarQube quality gate fails"
        required: false
        type: boolean
        default: true
    secrets:
      SONAR_FOUNDATION_TOKEN:
        required: true

  workflow_dispatch:
    inputs:
      sonar_host_url:
        description: "SonarQube host URL"
        required: false
        type: string
        default: "http://sonar.afya.tools:9000/"
      sonar_exclusions:
        description: "Additional Sonar exclusions"
        required: false
        type: string
        default: ""
      fail_on_quality_gate:
        description: "Fail the job if the SonarQube quality gate fails"
        required: false
        type: boolean
        default: true

jobs:
  static-application-security-testing:
    runs-on: runner-security-${{ github.repository_owner }}

    permissions:
      contents: read
      checks: write
      pull-requests: write

    env:
      SONAR_HOST_URL: ${{ inputs.sonar_host_url }}
      APPLICATION_NAME: ${{ github.event.repository.name }}
      COMPANY: ${{ github.repository_owner }}
      GIT_DEPTH: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pull a coverage report if the caller uploaded one (artifact "coverage").
      # Language-agnostic: repos without coverage have no artifact and skip this.
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage
          path: .

      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.dependencyCheck.securityHotspot=true \
            -Dsonar.dependencyCheck.summarize=true \
            -Dsonar.qualitygate.wait=${{ inputs.fail_on_quality_gate }} \
            -Dsonar.projectKey=$COMPANY-$APPLICATION_NAME \
            -Dsonar.projectName=$COMPANY-$APPLICATION_NAME \
            -Dsonar.plugins.downloadOnlyRequired=true \
            -Dsonar.token=${{ secrets.SONAR_FOUNDATION_TOKEN }} \
            -Dsonar.projectBaseDir=${{ github.workspace }} \
            -Dsonar.sources=. \
            -Dsonar.scm.provider=git \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.go.coverage.reportPaths=coverage.out \
            ${{ github.event_name == 'pull_request' && format('-Dsonar.pullrequest.key={0} -Dsonar.pullrequest.branch={1} -Dsonar.pullrequest.base={2}', github.event.pull_request.number, github.head_ref, github.base_ref) || '' }} \
            -Dsonar.exclusions="chart/**,node_modules/**,dist/**,coverage/**${{ inputs.sonar_exclusions != '' && format(',{0}', inputs.sonar_exclusions) || '' }}"
