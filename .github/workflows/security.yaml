name: Security Workflow

on:
  workflow_call:
    inputs:
      sonar_host_url:
        description: "SonarQube host URL"
        required: false
        type: string
        default: "http://sonar.afya.tools:9000/"
      sonar_exclusions:
        description: "Additional Sonar exclusions"
        required: false
        type: string
        default: ""
      coverage_artifact:
        description: "Name of a coverage artifact to download from a prior job in the same run (leave empty to skip)"
        required: false
        type: string
        default: ""
      coverage_report_paths:
        description: "Path(s) to the coverage report relative to the repo root (e.g. coverage.out)"
        required: false
        type: string
        default: ""
      coverage_sonar_key:
        description: "Sonar property key for the coverage report paths (language-specific)"
        required: false
        type: string
        default: "sonar.go.coverage.reportPaths"
    secrets:
      SONAR_FOUNDATION_TOKEN:
        required: true

  workflow_dispatch:
    inputs:
      sonar_host_url:
        description: "SonarQube host URL"
        required: false
        type: string
        default: "http://sonar.afya.tools:9000/"
      sonar_exclusions:
        description: "Additional Sonar exclusions"
        required: false
        type: string
        default: ""

jobs:
  static-application-security-testing:
    runs-on: runner-security-${{ github.repository_owner }}

    permissions:
      contents: read
      checks: write
      pull-requests: write

    env:
      SONAR_HOST_URL: ${{ inputs.sonar_host_url }}
      APPLICATION_NAME: ${{ github.event.repository.name }}
      COMPANY: ${{ github.repository_owner }}
      GIT_DEPTH: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        if: inputs.coverage_artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.coverage_artifact }}

      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.dependencyCheck.securityHotspot=true \
            -Dsonar.dependencyCheck.summarize=true \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.projectKey=$COMPANY-$APPLICATION_NAME \
            -Dsonar.projectName=$COMPANY-$APPLICATION_NAME \
            -Dsonar.plugins.downloadOnlyRequired=true \
            -Dsonar.token=${{ secrets.SONAR_FOUNDATION_TOKEN }} \
            -Dsonar.projectBaseDir=${{ github.workspace }} \
            -Dsonar.sources=. \
            -Dsonar.scm.provider=git \
            -Dsonar.sourceEncoding=UTF-8 \
            ${{ github.event_name == 'pull_request' && format('-Dsonar.pullrequest.key={0} -Dsonar.pullrequest.branch={1} -Dsonar.pullrequest.base={2}', github.event.pull_request.number, github.head_ref, github.base_ref) || '' }} \
            ${{ inputs.coverage_report_paths != '' && format('-D{0}={1}', inputs.coverage_sonar_key, inputs.coverage_report_paths) || '' }} \
            -Dsonar.exclusions="chart/**,node_modules/**,dist/**,coverage/**${{ inputs.sonar_exclusions != '' && format(',{0}', inputs.sonar_exclusions) || '' }}"
